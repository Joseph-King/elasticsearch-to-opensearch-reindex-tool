services:
  reindex:
    build:
      context: ./src
      dockerfile: Containerfile
    container_name: reindex
    env_file: .env
    depends_on:
      elasticsearch:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
    container_name: elasticsearch
    environment:
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - discovery.type=single-node
      - xpack.security.enabled=true
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs --user '${ELASTICSEARCH_USERNAME}:${ELASTICSEARCH_PASSWORD}' http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  opensearch:
    image: opensearchproject/opensearch:2.8.0
    container_name: opensearch
    environment:
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - discovery.type=single-node
      - plugins.security.disabled=true
      - reindex.remote.allowlist=elasticsearch:9200
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f --user '${OPENSEARCH_USERNAME}:${OPENSEARCH_PASSWORD}' http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  esdata:
    driver: local
  osdata:     
    driver: local